<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Trail Art</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    height: 100%;
    width: 100%;
    cursor: crosshair;
  }
  canvas {
    display: block;
  }
  #controls {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(20, 20, 20, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    padding: 14px 16px;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    backdrop-filter: blur(6px);
    width: 190px;
    user-select: none;
  }
  #controls h3 {
    margin: 0 0 10px 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #fff;
  }
  #controls label {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  #controls input[type="range"] {
    width: 100%;
    accent-color: #ff5a5a;
    cursor: pointer;
  }
  #controls button {
    margin-top: 14px;
    width: 100%;
    padding: 8px 0;
    background: #e2231a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #controls button:hover {
    background: #ff3b30;
  }
</style>
</head>
<body>
<div id="controls">
  <h3>Controls</h3>
  <label for="sizeSlider"><span>Size</span><span id="sizeValue">1.0</span></label>
  <input type="range" id="sizeSlider" min="0.2" max="3" step="0.1" value="1">
  <label for="speedSlider"><span>Speed</span><span id="speedValue">1.0</span></label>
  <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="1">
  <button id="clearBtn">Clear Screen</button>
</div>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const LIFETIME = 1000; // ms
  const BASE_GRAVITY = 0.12; // px per frame^2
  let particles = [];

  // --- Control panel state ---
  let sizeMultiplier = 1;
  let speedMultiplier = 1;

  const sizeSlider = document.getElementById('sizeSlider');
  const speedSlider = document.getElementById('speedSlider');
  const sizeValue = document.getElementById('sizeValue');
  const speedValue = document.getElementById('speedValue');
  const clearBtn = document.getElementById('clearBtn');

  sizeSlider.addEventListener('input', () => {
    sizeMultiplier = parseFloat(sizeSlider.value);
    sizeValue.textContent = sizeMultiplier.toFixed(1);
  });
  speedSlider.addEventListener('input', () => {
    speedMultiplier = parseFloat(speedSlider.value);
    speedValue.textContent = speedMultiplier.toFixed(1);
  });
  clearBtn.addEventListener('click', () => {
    particles = [];
  });

  function addParticle(x, y) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 2 + 0.5) * speedMultiplier;
    particles.push({
      x,
      y,
      radius: (Math.random() * 4 + 3) * sizeMultiplier,
      hue: Math.floor(Math.random() * 360),
      born: performance.now(),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed
    });
  }

  window.addEventListener('mousemove', (e) => {
    // add a few particles per move for a fuller trail
    for (let i = 0; i < 2; i++) {
      addParticle(
        e.clientX + (Math.random() - 0.5) * 6,
        e.clientY + (Math.random() - 0.5) * 6
      );
    }
  });

  // support touch devices too
  window.addEventListener('touchmove', (e) => {
    for (const t of e.touches) {
      addParticle(t.clientX, t.clientY);
    }
  }, { passive: true });

  // --- Angry Bird that follows the cursor ---
  const bird = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    angle: 0,
    flap: 0
  };
  let targetX = bird.x;
  let targetY = bird.y;

  window.addEventListener('mousemove', (e) => {
    targetX = e.clientX;
    targetY = e.clientY;
  });
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length) {
      targetX = e.touches[0].clientX;
      targetY = e.touches[0].clientY;
    }
  }, { passive: true });

  function drawAngryBird(x, y, angle, flap) {
    const r = 40; // body radius
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // tail feathers
    ctx.fillStyle = '#7a1010';
    ctx.beginPath();
    ctx.moveTo(-r * 0.7, -r * 0.2);
    ctx.lineTo(-r * 1.5, -r * 0.9);
    ctx.lineTo(-r * 0.9, -r * 0.1);
    ctx.lineTo(-r * 1.4, r * 0.2);
    ctx.lineTo(-r * 0.6, r * 0.2);
    ctx.closePath();
    ctx.fill();

    // body
    ctx.fillStyle = '#e2231a';
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // belly
    ctx.fillStyle = '#f2c94c';
    ctx.beginPath();
    ctx.ellipse(r * 0.15, r * 0.35, r * 0.55, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // head feather (angry tuft), gently flaps
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-r * 0.1, -r * 0.95);
    ctx.quadraticCurveTo(-r * 0.3, -r * 1.6 - flap, -r * 0.55, -r * 1.3 - flap);
    ctx.stroke();

    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-r * 0.15, -r * 0.15, r * 0.32, r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r * 0.45, -r * 0.15, r * 0.28, r * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-r * 0.05, -r * 0.1, r * 0.13, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(r * 0.55, -r * 0.1, r * 0.11, 0, Math.PI * 2);
    ctx.fill();

    // angry eyebrows
    ctx.strokeStyle = '#000';
    ctx.lineWidth = r * 0.18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-r * 0.5, -r * 0.5);
    ctx.lineTo(-r * 0.05, -r * 0.28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r * 0.8, -r * 0.5);
    ctx.lineTo(r * 0.3, -r * 0.28);
    ctx.stroke();

    // beak
    ctx.fillStyle = '#f2994a';
    ctx.beginPath();
    ctx.moveTo(r * 0.75, r * 0.05);
    ctx.lineTo(r * 1.35, r * 0.18);
    ctx.lineTo(r * 0.75, r * 0.35);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#c76e1f';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(r * 0.75, r * 0.2);
    ctx.lineTo(r * 1.15, r * 0.2);
    ctx.stroke();

    ctx.restore();
  }

  function animate(now) {
    ctx.fillStyle = 'rgba(0, 0, 0, 1)';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles = particles.filter(p => now - p.born < LIFETIME);

    for (const p of particles) {
      const age = now - p.born;
      const t = age / LIFETIME;
      const alpha = 1 - t;
      p.vy += BASE_GRAVITY * speedMultiplier;
      p.x += p.vx;
      p.y += p.vy;

      const hue = (p.hue + t * 360) % 360; // cycle through rainbow as it fades
      const color = `hsl(${hue}, 100%, 60%)`;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * (1 - t * 0.3), 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 12;
      ctx.shadowColor = color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // move the bird toward the cursor with a bit of lag ("spring" follow)
    const dx = targetX - bird.x;
    const dy = targetY - bird.y;
    bird.x += dx * 0.12;
    bird.y += dy * 0.12;

    // tilt in the direction of travel
    const targetAngle = Math.atan2(dy, dx) * 0.5;
    bird.angle += (targetAngle - bird.angle) * 0.15;

    // gentle flap animation
    bird.flap = Math.sin(now / 120) * 4;

    drawAngryBird(bird.x, bird.y, bird.angle, bird.flap);

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
</script>
</body>
</html>
